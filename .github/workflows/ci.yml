name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Node Validations
        run: |
          if [ -f package.json ]; then
            echo "package.json found, running npm install..."
            npm install
            
            if jq -e '.scripts.validate' package.json > /dev/null; then
              echo "Running npm validate..."
              npm run validate
            elif jq -e '.scripts.verify' package.json > /dev/null; then
              echo "Running npm verify..."
              npm run verify
            fi
            
            if jq -e '.scripts.test' package.json > /dev/null; then
              echo "Running npm test..."
              npm test
            fi
          else
            echo "No package.json found. Skipping Node steps."
          fi

      - name: Run Python Validations
        run: |
          if [ -f requirements.txt ]; then
            echo "Installing python dependencies from requirements.txt..."
            pip install -r requirements.txt
          elif [ -f scripts/requirements.txt ]; then
            echo "Installing python dependencies from scripts/requirements.txt..."
            pip install -r scripts/requirements.txt
          fi
          
          if [ -d tests ]; then
            if [ ! -f package.json ] || [ -f requirements.txt ] || [ -f scripts/requirements.txt ]; then
              echo "Running python tests..."
              python -m unittest discover -s tests -v || echo "Python unittest failed or returned no tests, but continuing."
            fi
          fi
